apiVersion: v1
kind: Service
metadata:
  name: url-shortener
  namespace: url-shortener
  labels:
    app: url-shortener
spec:
  type: LoadBalancer  # Use LoadBalancer to expose externally (or NodePort for Minikube)
  ports:
    - name: app
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: url-shortener
