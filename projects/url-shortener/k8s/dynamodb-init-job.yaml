apiVersion: batch/v1
kind: Job
metadata:
  name: dynamodb-init
  namespace: url-shortener
  labels:
    app: dynamodb-init
spec:
  # Only run once, don't retry if it fails
  backoffLimit: 1
  # Clean up the job after 1 hour
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: dynamodb-init
    spec:
      # Don't restart the pod if it fails
      restartPolicy: Never
      containers:
      - name: dynamodb-init
        image: amazon/aws-cli:latest
        command:
        - /bin/sh
        - -c
        - |
          # Wait for DynamoDB to be ready
          echo "Waiting for DynamoDB to be ready..."
          for i in {1..30}; do
            if aws dynamodb list-tables --endpoint-url http://dynamodb-local:8000 --region us-east-1 2>/dev/null; then
              echo "DynamoDB is ready!"
              break
            fi
            echo "Attempt $i/30 - DynamoDB not ready yet, waiting..."
            sleep 2
          done
          
          # Create the table
          echo "Creating 'urls' table..."
          aws dynamodb create-table \
            --table-name urls \
            --attribute-definitions AttributeName=short_code,AttributeType=S \
            --key-schema AttributeName=short_code,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --endpoint-url http://dynamodb-local:8000 \
            --region us-east-1
          
          if [ $? -eq 0 ]; then
            echo "Table created successfully!"
          else
            # Table might already exist, which is fine
            echo "Table creation completed (may already exist)"
          fi
        
        # AWS CLI environment variables
        env:
        - name: AWS_ACCESS_KEY_ID
          value: "dummy"
        - name: AWS_SECRET_ACCESS_KEY
          value: "dummy"
        - name: AWS_DEFAULT_REGION
          value: "us-east-1"
        
        # Resource limits
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
