apiVersion: v1
kind: ConfigMap
metadata:
  name: url-shortener-config
  namespace: url-shortener
data:
  # Application Configuration
  PORT: "8080"
  METRICS_PORT: "9090"
  
  # DynamoDB Configuration
  AWS_REGION: "us-east-1"
  DYNAMO_TABLE: "urls"
  DYNAMO_ENDPOINT: "http://dynamodb-local:8000"  # Resolves to dynamodb service in the cluster
  
  # Redis Configuration
  REDIS_ADDR: "redis:6379"  # Resolves to redis service in the cluster
  
  # Kafka Configuration
  KAFKA_BROKER: "kafka:9092"  # Resolves to kafka service in the cluster
  KAFKA_TOPIC: "redirect-events"
